<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>
<body>
    <main>
        

        <h2>Faça seu login</h2>
        <p>Entre com suas informações de cadastro</p>
        
        <!-- Campos de digitação-->
         <!-- email-->
        <div class="input-container">
        <label for="email" class="inputs">Email</label>
        <input type="email" class="inputs" placeholder="Digite on seu email">
        <br>
        </div>

        <br> <br>
         
        <!--senha -->
        <div class="input-container">
        <label class="inputs" for="password">Senha</label>
        <input class="inputs" type="password" placeholder="Digite on sua senha">
        </div>

    </main>
</body>
</html>
