<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>
<body>
    <header>Aveck</header>
    <main>
        <div class="login-form">
            <h2>Faça seu login</h2>
            <p>Entre com suas informações de cadastro</p>
            
            <!-- Campos de digitação-->
            <!-- email-->
            <div class="input-container">
                <label for="email" class="inputs">E-mail</label>
                <input type="email" class="inputs" placeholder="Digite on seu email">
            </div>

            <br>
            
            <!--senha -->
            <div class="input-container">
                <label class="inputs" for="password">Senha</label>
                <input class="inputs" type="password" placeholder="Digite sua senha">
            </div>

            <!--checbox e equeci minha senha -->
            <div class="checbox-forgettenpassword">
                <button></button>
                <a>Esqueci minha senha</a>
            </div>

        </div>

        <div id="imagem-background"></div>

    </main>
</body>
</html>
